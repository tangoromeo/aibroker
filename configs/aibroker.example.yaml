mode: http
listen: ":8080"

# Primary upstream — local/corporate model (Kilo talks to this)
upstream:
  url: "http://your-llm-endpoint"
  api_key: "${UPSTREAM_API_KEY}"
  timeout: 5m
  headers:
    # Custom headers passed to upstream (e.g. project ID, auth tokens)
    # MyProjectHeader: "project-id-here"
  tls:
    insecure: false

# Broker: screening + escalation orchestration
broker:
  min_failures: 3  # how many failures before escalation triggers

  # Screening LLM — evaluates security policies (can be the same endpoint)
  screening:
    url: "http://your-llm-endpoint"
    model: "your-screening-model"
    api_key: "${SCREENING_API_KEY}"
    timeout: 60s
    headers:
      # Same as upstream if using the same endpoint

  # Escalation mode: "stub" writes to files, "live" calls external model
  escalation_mode: stub
  stub_dir: escalation_dumps

  # External model — escalation target (used when escalation_mode: live)
  escalation:
    url: "https://api.openai.com"
    model: "gpt-4o"
    api_key: "${ESCALATION_API_KEY}"
    timeout: 2m

  # Security policies — rules are shared between shaper (anonymize) and screener (detect).
  # Shaper uses rules to know WHAT to strip; screener uses rules to know WHAT to flag.
  policies:
    - name: secrets
      severity: critical
      action: block
      description: "Detect hardcoded secrets and credentials"
      rules: |
        - API keys, access tokens, bearer tokens
        - Passwords, passphrases, secret phrases
        - Database connection strings with credentials
        - Private keys, certificates, PEM blocks
        - AWS/GCP/Azure access keys and secrets
        - OAuth client secrets
        - Any string that looks like a credential (base64-encoded, high-entropy)

    - name: pii
      severity: high
      action: block
      description: "Detect personally identifiable information"
      rules: |
        - Real person names (not variable names)
        - Email addresses (real, not example.com)
        - Phone numbers
        - Physical addresses
        - SSN, passport, ID numbers
        - Dates of birth linked to a person

    - name: corporate-identity
      severity: high
      action: block
      description: "Detect corporate identity leaks"
      rules: |
        - Internal domain names (*.corp, *.internal, *.local, company-specific)
        - Internal hostnames, service names, infrastructure naming conventions
        - Corporate name, its derivatives and abbreviations
        - Corporate email addresses
        - Employee names, team names, department names
        - Internal project codenames or identifiers
        - Internal URLs (Jira, Confluence, wiki, Git)
        - Internal IP ranges, VPN endpoints
        - Company-specific HTTP headers or config keys
        - References to internal systems, tools, or platforms by name

    # BACKLOG: proprietary code detection needs a custom embedder
    # - name: proprietary
    #   severity: medium
    #   action: warn
    #   rules: "..."

log:
  level: debug
  format: text

# Dumps: request_N.json + request_N.meta.json — meta shows path; broker_escalation_pipeline
# is true only for POST /v1/chat/completions (Kilo also hits /v1/models etc. — those bypass broker).
pipeline:
  - middleware: logging
  - middleware: tool_adapter
  - middleware: dump
  # escalation_detect убран — shape/screen/forward работают на каждый запрос
  # верни escalation_detect когда нужно чтобы эскалация срабатывала только по failures
  #- middleware: escalation_detect
  - middleware: escalation_shape
  - middleware: escalation_screen
  - middleware: escalation_forward
